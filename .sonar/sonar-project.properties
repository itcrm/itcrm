sonar.projectKey=itcrm
sonar.projectName=ITCRM
sonar.projectVersion=0.0.1

sonar.sources=.
sonar.tests=e2e
sonar.sourceEncoding=UTF-8

sonar.exclusions=\
  **/node_modules/**,\
  **/coverage/**,\
  **/tcpdf/**,\
  **/doc/**,\
  **/e2e/**,\
  js/tiny_mce/**,\
  js/jquery*,\
  js/fullcalendar.js,\
  js/date.format.js,\
  js/phototagger.jquery.js,\
  js/calendar.js,\
  js/colorPicker.js,\
  css/fullcalendar.css,\
  css/redmond/**,\
  css/task.css,\
  css/colorPicker.css

sonar.test.inclusions=**/*.spec.ts,**/*.test.ts

sonar.php.coverage.reportPaths=coverage/clover.xml

sonar.coverage.exclusions=\
  **/*.spec.ts,\
  **/*.test.ts,\
  **/e2e/**,\
  **/*.config.ts,\
  **/*.config.js
