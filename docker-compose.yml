services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: itcrm-php
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-80}:80"
    environment:
      - DB_PATH=/var/www/html/data/database.sqlite
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
    volumes:
      - ./classes:/var/www/html/classes:cached
      - ./templates:/var/www/html/templates:cached
      - ./css:/var/www/html/css:cached
      - ./js:/var/www/html/js:cached
      - ./images:/var/www/html/images:cached
      - ./tcpdf:/var/www/html/tcpdf:cached
      - ./faili:/var/www/html/faili:cached
      - ./data:/var/www/html/data
    networks:
      - itcrm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  itcrm-network:
    driver: bridge
